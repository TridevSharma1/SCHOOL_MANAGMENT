<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Student App{% endblock %}</title>

    <!-- 🔥 Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Student Management</a>

        <div>
            <a class="btn btn-outline-light me-2" href="{% url 'student_list' %}">Home</a>
            <a class="btn btn-success" href="{% url 'add_student' %}">Add Student</a>
        </div>
    </div>
</nav>

<!-- 🔹 MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- 🔹 FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p class="mb-0">© 2026 Student App Management</p>
</footer>

<!-- 🔥 Bootstrap JS (optional but good) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
